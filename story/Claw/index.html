<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw - 中文网页构建器</title>
    <link rel="stylesheet" href="node_modules/grapesjs/dist/css/grapes.min.css">
    <link rel="stylesheet" href="css/custom.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        .gjs-cv-canvas {
            top: 0;
            width: 100%;
            height: 100%;
        }
        
        /* 中文样式优化 */
        .gjs-block {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
        }
        
        .gjs-block-label {
            font-size: 14px;
            line-height: 1.5;
        }
        
        /* 添加中文字体支持 */
        .gjs-pn-panel {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
        }
        
        /* 覆盖默认样式以更好地显示中文 */
        .gjs-cv-canvas::-webkit-scrollbar,
        .gjs-pn-views::-webkit-scrollbar,
        .gjs-blocks-c::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        .gjs-cv-canvas::-webkit-scrollbar-thumb,
        .gjs-pn-views::-webkit-scrollbar-thumb,
        .gjs-blocks-c::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="gjs"></div>
    
    <script src="node_modules/grapesjs/dist/grapes.min.js"></script>
    <script src="js/blocks.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
